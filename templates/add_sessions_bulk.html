<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動日まとめて追加</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>活動日まとめて追加</h1>
            <a href="/activities/{{ activity.id }}/sessions" class="top-button">活動日管理に戻る</a>
        </div>

        <p>
            <strong>活動名：</strong>{{ activity.name }}
        </p>

        <form method="post" action="/activities/{{ activity.id }}/sessions/add_bulk">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>開始日</label>
            <input type="date" name="start_date" required>

            <label>追加回数</label>
            <input type="number" name="count" min="1" max="100" required>

            <label>タイトル</label>
            <input type="text" name="title" value="通常活動">

            <label>場所</label>
            <input type="text" name="place">

            <label>備考</label>
            <textarea name="note"></textarea>

            <button type="submit">まとめて追加</button>
        </form>
    </div>
</body>
</html>

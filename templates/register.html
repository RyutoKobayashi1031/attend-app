<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規ユーザー登録</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>新規ユーザー登録</h1>
            <a href="{{ url_for('login') }}" class="top-button">ログインへ戻る</a>
        </div>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <form method="post" action="{{ url_for('register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" value="{{ username }}" maxlength="100" autocomplete="username" required>

            <label for="email">メールアドレス</label>
            <input id="email" name="email" type="email" value="{{ email }}" maxlength="255" autocomplete="email" required>

            <label for="password">パスワード（8文字以上）</label>
            <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required>

            <label for="confirm_password">パスワード確認</label>
            <input id="confirm_password" name="confirm_password" type="password" minlength="8" autocomplete="new-password" required>

            <button type="submit">登録する</button>
        </form>
    </div>
</body>
</html>

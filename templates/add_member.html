<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メンバー追加</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>メンバー追加</h1>
            <a href="/activities/{{ activity.id }}/members" class="top-button">メンバー管理に戻る</a>
        </div>

        <p>
            <strong>活動名：</strong>{{ activity.name }}
        </p>

        <form method="post" action="/activities/{{ activity.id }}/members/add">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>名前</label>
            <input type="text" name="name" required>

            <label>所属グループ</label>
            <input type="text" name="group_name" placeholder="例：企画班、営業部、弦楽器">

            <label>所属区分</label>
            <input type="text" name="category" placeholder="例：2026年度、3年、OB、1期">

            <label>備考</label>
            <textarea name="note"></textarea>

            <button type="submit">追加</button>
        </form>
    </div>
</body>
</html>

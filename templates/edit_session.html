<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動日編集</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>活動日編集</h1>
            <a href="/activities/{{ activity.id }}/sessions" class="top-button">活動日管理に戻る</a>
        </div>

        <p>
            <strong>活動名：</strong>{{ activity.name }}
        </p>

        <form method="post" action="/activities/{{ activity.id }}/sessions/edit/{{ session.id }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>活動日</label>
            <input type="date" name="session_date" value="{{ session.session_date }}" required>

            <label>タイトル</label>
            <input type="text" name="title" value="{{ session.title }}">

            <label>場所</label>
            <input type="text" name="place" value="{{ session.place }}">

            <label>備考</label>
            <textarea name="note">{{ session.note }}</textarea>

            <button type="submit">更新</button>
        </form>
    </div>
</body>
</html>

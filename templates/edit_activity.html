<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動編集</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>活動編集</h1>
            <a href="/activities/{{ activity.id }}" class="top-button">活動トップに戻る</a>
        </div>

        <form method="post" action="/activities/edit/{{ activity.id }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <label>活動名</label>
            <input type="text" name="name" value="{{ activity.name }}" required>

            <label>説明</label>
            <textarea name="description">{{ activity.description }}</textarea>

            <button type="submit">更新</button>
        </form>
    </div>
</body>
</html>
